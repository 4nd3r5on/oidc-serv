openapi: 3.0.3
info:
  title: Users
  version: 0.1.0

paths:
  /users:
    post:
      operationId: createUser
      summary: Create a user
      description: |
        Creates a new user account.

        - `username`: 3–32 characters, letters/digits/underscores only
        - `password`: minimum 8 characters; stored as a bcrypt hash, never returned
        - `locale`: BCP 47 language tag; defaults to `en` if omitted
      tags: [Users]
      security:
        - sessionAuth: []
        - tmbAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateUserResponse'
        '400':
          $ref: './lib/errs.yml#/components/responses/BadRequest'
        '401':
          $ref: './lib/errs.yml#/components/responses/Unauthorized'
        '409':
          $ref: './lib/errs.yml#/components/responses/Conflict'
        default:
          $ref: './lib/errs.yml#/components/responses/InternalError'

  /users/{userId}:
    parameters:
      - $ref: '#/components/parameters/UserIdParam'

    get:
      operationId: getUserById
      summary: Get a user by ID
      tags: [Users]
      security:
        - sessionAuth: []
        - tmbAuth: []
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: './lib/errs.yml#/components/responses/Unauthorized'
        '404':
          $ref: './lib/errs.yml#/components/responses/NotFound'
        default:
          $ref: './lib/errs.yml#/components/responses/InternalError'

  /users/by-username/{username}:
    parameters:
      - name: username
        in: path
        required: true
        schema:
          type: string
          minLength: 3
          maxLength: 32

    get:
      operationId: getUserByUsername
      summary: Get a user by username
      tags: [Users]
      security:
        - sessionAuth: []
        - tmbAuth: []
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: './lib/errs.yml#/components/responses/Unauthorized'
        '404':
          $ref: './lib/errs.yml#/components/responses/NotFound'
        default:
          $ref: './lib/errs.yml#/components/responses/InternalError'

  /me:
    get:
      operationId: getMe
      summary: Get the authenticated user
      tags: [Me]
      security:
        - sessionAuth: []
        - tmbAuth: []
      responses:
        '200':
          description: Authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: './lib/errs.yml#/components/responses/Unauthorized'
        default:
          $ref: './lib/errs.yml#/components/responses/InternalError'

    patch:
      operationId: updateMe
      summary: Update the authenticated user's username and/or locale
      tags: [Me]
      security:
        - sessionAuth: []
        - tmbAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '204':
          description: Updated
        '400':
          $ref: './lib/errs.yml#/components/responses/BadRequest'
        '401':
          $ref: './lib/errs.yml#/components/responses/Unauthorized'
        '409':
          $ref: './lib/errs.yml#/components/responses/Conflict'
        default:
          $ref: './lib/errs.yml#/components/responses/InternalError'

    delete:
      operationId: deleteMe
      summary: Delete the authenticated user
      tags: [Me]
      security:
        - sessionAuth: []
        - tmbAuth: []
      responses:
        '204':
          description: Deleted
        '401':
          $ref: './lib/errs.yml#/components/responses/Unauthorized'
        default:
          $ref: './lib/errs.yml#/components/responses/InternalError'

  /me/password:
    patch:
      operationId: updateMyPassword
      summary: Change the authenticated user's password
      description: |
        Verifies `old_password` against the stored bcrypt hash before applying the change.
        Returns `401` for both wrong `old_password` and missing authentication,
        using the same error to prevent information leakage.
      tags: [Me]
      security:
        - sessionAuth: []
        - tmbAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePasswordRequest'
      responses:
        '204':
          description: Password updated
        '400':
          $ref: './lib/errs.yml#/components/responses/BadRequest'
        '401':
          $ref: './lib/errs.yml#/components/responses/Unauthorized'
        default:
          $ref: './lib/errs.yml#/components/responses/InternalError'

components:
  parameters:
    UserIdParam:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid
        example: 018e4f3a-1b2c-7d8e-9f0a-b1c2d3e4f5a6

  schemas:
    User:
      description: Safe user projection. Never includes the password hash.
      type: object
      required: [id, username, locale]
      properties:
        id:
          type: string
          format: uuid
          example: 018e4f3a-1b2c-7d8e-9f0a-b1c2d3e4f5a6
        username:
          type: string
          minLength: 3
          maxLength: 32
          example: alice
        locale:
          description: BCP 47 language tag.
          type: string
          example: en-US

    CreateUserResponse:
      type: object
      required: [id]
      properties:
        id:
          type: string
          format: uuid
          example: 018e4f3a-1b2c-7d8e-9f0a-b1c2d3e4f5a6

    CreateUserRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 32
          pattern: '^[a-zA-Z0-9_]+$'
          example: alice
        password:
          description: Plain text; stored as bcrypt hash, never returned.
          type: string
          format: password
          minLength: 8
          example: s3cr3tpassword
        locale:
          description: BCP 47 language tag. Defaults to `en` if omitted.
          type: string
          example: en-US

    UpdateUserRequest:
      description: At least one field must be provided.
      type: object
      minProperties: 1
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 32
          pattern: '^[a-zA-Z0-9_]+$'
          example: alice
        locale:
          description: BCP 47 language tag.
          type: string
          example: en-US

    UpdatePasswordRequest:
      type: object
      required: [old_password, new_password]
      properties:
        old_password:
          type: string
          format: password
          minLength: 8
        new_password:
          type: string
          format: password
          minLength: 8
