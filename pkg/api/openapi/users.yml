openapi: 3.0.3
info:
  title: Users
  version: 0.1.0

paths:
  /users:
    get:
      operationId: listUsers
      summary: List users
      description: |
        Returns a paginated list of user accounts.

        **Consumer note:** the default `users.Repository` interface does not
        include a list/pagination method. The handler implementation must use
        an extended repository interface that exposes a list operation with
        `limit`/`offset` support.
      tags: [Users]
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Paginated list of users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserList'
        '400':
          $ref: './lib/errs.yml#/components/responses/BadRequest'
        '500':
          $ref: './lib/errs.yml#/components/responses/InternalError'

    post:
      operationId: createUser
      summary: Create a user
      description: |
        Creates a new user account. The `password` field is accepted in plain
        text and stored as a bcrypt hash; it is never returned in responses.

        **Consumer note:** idempotency deduplication requires a cache/store
        keyed by `Idempotency-Key`. The default implementation does not
        include this store; consumers must provide it.
      tags: [Users]
      parameters:
        - $ref: './lib/idempotency.yml#/components/parameters/IdempotencyKeyParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: './lib/errs.yml#/components/responses/BadRequest'
        '409':
          $ref: './lib/errs.yml#/components/responses/Conflict'
        '500':
          $ref: './lib/errs.yml#/components/responses/InternalError'

  /users/{userId}:
    parameters:
      - $ref: '#/components/parameters/UserIdParam'

    get:
      operationId: getUser
      summary: Get a user by ID
      description: Looks up a user by UUID using `users.Repository.ByID`.
      tags: [Users]
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          $ref: './lib/errs.yml#/components/responses/NotFound'
        '500':
          $ref: './lib/errs.yml#/components/responses/InternalError'

    patch:
      operationId: updateUser
      summary: Partially update a user
      description: |
        Updates one or more fields of an existing user. Uses
        `users.Repository.Save` (upsert semantics on the same ID).

        **Consumer note:** idempotency deduplication requires a cache/store
        keyed by `Idempotency-Key`. The default implementation does not
        include this store; consumers must provide it.
      tags: [Users]
      parameters:
        - $ref: './lib/idempotency.yml#/components/parameters/IdempotencyKeyParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: './lib/errs.yml#/components/responses/BadRequest'
        '404':
          $ref: './lib/errs.yml#/components/responses/NotFound'
        '409':
          $ref: './lib/errs.yml#/components/responses/Conflict'
        '500':
          $ref: './lib/errs.yml#/components/responses/InternalError'

    delete:
      operationId: deleteUser
      summary: Delete a user
      description: Removes a user account using `users.Repository.Delete`.
      tags: [Users]
      responses:
        '204':
          description: User deleted
        '404':
          $ref: './lib/errs.yml#/components/responses/NotFound'
        '500':
          $ref: './lib/errs.yml#/components/responses/InternalError'

components:
  parameters:
    UserIdParam:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid
        example: 018e4f3a-1b2c-7d8e-9f0a-b1c2d3e4f5a6

  schemas:
    User:
      description: |
        Represents a user account. Maps to the `users.User` entity.
        `username` and `locale` are also returned as OIDC claims when the
        `core` scope is granted (see `app.Service.coreClaims`).
      type: object
      required: [id, username, locale]
      properties:
        id:
          type: string
          format: uuid
          example: 018e4f3a-1b2c-7d8e-9f0a-b1c2d3e4f5a6
        username:
          type: string
          example: alice
        locale:
          description: BCP 47 language tag. Exposed as the `locale` OIDC claim.
          type: string
          example: en-US

    UserList:
      description: |
        Paginated list of users.

        **Consumer note:** `total` must reflect the full count of matching
        records, not just the current page. The repository implementation
        is responsible for returning this count alongside the page of items.
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/User'
        total:
          type: integer
          description: Total number of users matching the query.
          example: 42

    CreateUserRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          example: alice
        password:
          description: |
            Plain-text password. The server stores a bcrypt hash
            (`users.User.PasswordHash`); this value is never returned.
          type: string
          format: password
          example: s3cr3t
        locale:
          description: |
            BCP 47 language tag. Defaults to empty string if omitted.

            **Consumer note:** the default `users.User` entity stores locale
            as a plain string with no validation. Locale format enforcement
            is left to the consumer's service layer.
          type: string
          example: en-US

    UpdateUserRequest:
      description: At least one field must be provided.
      type: object
      minProperties: 1
      properties:
        username:
          type: string
          example: alice
        password:
          description: |
            New plain-text password. The server re-hashes and stores it as
            `users.User.PasswordHash`; this value is never returned.
          type: string
          format: password
          example: n3ws3cr3t
        locale:
          description: BCP 47 language tag.
          type: string
          example: en-US
