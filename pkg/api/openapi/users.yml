openapi: 3.0.3
info:
  title: Users
  version: 0.1.0

paths:
  /users:
    get:
      operationId: listUsers
      summary: List users
      tags: [Users]
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Paginated list of users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserList'
        '400':
          $ref: './lib/errs.yml#/components/responses/BadRequest'
        '500':
          $ref: './lib/errs.yml#/components/responses/InternalError'

    post:
      operationId: createUser
      summary: Create a user
      tags: [Users]
      parameters:
        - $ref: './lib/idempotency.yml#/components/parameters/IdempotencyKeyParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: './lib/errs.yml#/components/responses/BadRequest'
        '409':
          $ref: './lib/errs.yml#/components/responses/Conflict'
        '500':
          $ref: './lib/errs.yml#/components/responses/InternalError'

  /users/{userId}:
    parameters:
      - $ref: '#/components/parameters/UserIdParam'

    get:
      operationId: getUser
      summary: Get a user by ID
      tags: [Users]
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          $ref: './lib/errs.yml#/components/responses/NotFound'
        '500':
          $ref: './lib/errs.yml#/components/responses/InternalError'

    patch:
      operationId: updateUser
      summary: Partially update a user
      tags: [Users]
      parameters:
        - $ref: './lib/idempotency.yml#/components/parameters/IdempotencyKeyParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: './lib/errs.yml#/components/responses/BadRequest'
        '404':
          $ref: './lib/errs.yml#/components/responses/NotFound'
        '409':
          $ref: './lib/errs.yml#/components/responses/Conflict'
        '500':
          $ref: './lib/errs.yml#/components/responses/InternalError'

    delete:
      operationId: deleteUser
      summary: Delete a user
      tags: [Users]
      responses:
        '204':
          description: User deleted
        '404':
          $ref: './lib/errs.yml#/components/responses/NotFound'
        '500':
          $ref: './lib/errs.yml#/components/responses/InternalError'

components:
  parameters:
    UserIdParam:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid
        example: 018e4f3a-1b2c-7d8e-9f0a-b1c2d3e4f5a6

  schemas:
    User:
      type: object
      required: [id, email, name, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
          example: 018e4f3a-1b2c-7d8e-9f0a-b1c2d3e4f5a6
        email:
          type: string
          format: email
          example: alice@example.com
        name:
          type: string
          example: Alice Smith
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UserList:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/User'
        total:
          type: integer
          description: Total number of users matching the query
          example: 42

    CreateUserRequest:
      type: object
      required: [email, name]
      properties:
        email:
          type: string
          format: email
          example: alice@example.com
        name:
          type: string
          example: Alice Smith

    UpdateUserRequest:
      type: object
      minProperties: 1
      properties:
        email:
          type: string
          format: email
          example: alice@example.com
        name:
          type: string
          example: Alice Smith
