# https://github.com/OAI/OpenAPI-Specification/blob/main/versions/3.0.3.md
openapi: 3.0.3
info:
  title: oidc-serv API
  version: 0.1.0

paths:
  /users:
    $ref: './users.yml#/paths/~1users'
  /users/by-username/{username}:
    $ref: './users.yml#/paths/~1users~1by-username~1{username}'
  /me:
    $ref: './users.yml#/paths/~1me'
  /me/password:
    $ref: './users.yml#/paths/~1me~1password'
  /clients:
    $ref: './clients.yml#/paths/~1clients'
  /clients/{clientId}:
    $ref: './clients.yml#/paths/~1clients~1{clientId}'

components:
  securitySchemes:
    sessionAuth:
      type: http
      scheme: bearer
      description: |
        Session key issued by the login endpoint.
        Format: `Bearer <session-key>`
    tmbAuth:
      type: http
      scheme: bearer
      description: |
        Trust Me Bro — development/internal use only.
        Format: `Bearer TMB <user-uuid>`
    adminKeyAuth:
      type: apiKey
      in: header
      name: X-Admin-Key
      description: |
        Static admin API key configured via the `ADMIN_API_KEY` environment variable.
        Required for all client management endpoints.
