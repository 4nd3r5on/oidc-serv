openapi: 3.0.3
info:
  title: Common Error Components
  version: 0.1.0

components:
  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        code:
          type: string
        error:
          type: string
          example: resource not found

    ResourceConflictError:
      type: object
      required: [code, error]
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - properties:
            code:
              type: string
              enum: [resource_exists]
              example: resource_exists

  responses:
    BadRequest:
      description: Invalid request body or parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Unauthorized:
      description: Missing or invalid credentials
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Conflict:
      description: Username already taken
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ResourceConflictError'

    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
